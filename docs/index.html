<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MAINSPRING (free demo) - a clockwork engine-building roguelike</title>
<meta name="description" content="Place gears, mind your loops: meshed gears counter-rotate, and a tight loop jams the whole train. An engine-building roguelike about building one beautiful machine.">
<meta property="og:title" content="MAINSPRING">
<meta property="og:description" content="A clockwork engine-building roguelike. Meshed gears counter-rotate - close a tight loop and everything jams.">
<meta property="og:type" content="website">

<style>
/* MAINSPRING — workshop theme */
* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
  color: #efe6d0;
  background: radial-gradient(1200px 800px at 50% 30%, #262019 0%, #17130e 55%, #0d0b08 100%);
}
#app { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; }

h1, h2, h3, .serif { font-family: Georgia, "Times New Roman", serif; letter-spacing: 0.04em; }
.gold { color: #e9c34a; } .dim { color: #a2947a; } .red { color: #ff6b57; } .green { color: #8fd18a; }
.small { font-size: 12px; }

button {
  font-family: Georgia, serif; font-size: 15px; letter-spacing: 0.06em;
  color: #1d1710; background: linear-gradient(180deg, #e9c34a, #b98d24);
  border: 1px solid #6e5314; border-radius: 6px; padding: 8px 18px; cursor: pointer;
  box-shadow: 0 2px 0 #6e5314, inset 0 1px 0 rgba(255,255,255,0.35);
}
button:hover { filter: brightness(1.12); }
button:active { transform: translateY(1px); box-shadow: 0 1px 0 #6e5314; }
button:disabled { filter: grayscale(0.8) brightness(0.7); cursor: not-allowed; }
button.ghost {
  background: rgba(233,195,74,0.08); color: #d8c9a4; border: 1px solid #5a4a2c; box-shadow: none;
}
button.ghost:hover { background: rgba(233,195,74,0.16); }
button.big { font-size: 19px; padding: 12px 30px; }
button.danger { background: linear-gradient(180deg, #d96a4e, #a83f27); border-color: #6e2314; color: #fff; }

/* ---------- HUD ---------- */
#hud {
  width: 100%; max-width: 1180px; display: flex; align-items: center; gap: 14px;
  padding: 10px 16px; flex: 0 0 auto;
}
#hud .logo { font-size: 21px; color: #e9c34a; text-shadow: 0 0 14px rgba(233,195,74,0.35); white-space: nowrap; }
.pill {
  background: #241f16; border: 1px solid #4a3d24; border-radius: 20px;
  padding: 5px 14px; font-size: 14px; white-space: nowrap;
}
.pill b { color: #e9c34a; font-size: 16px; }
#quotabarwrap { flex: 1 1 auto; height: 22px; background: #1a1610; border: 1px solid #4a3d24; border-radius: 12px; overflow: hidden; position: relative; min-width: 120px; }
#quotabar { height: 100%; width: 0%; background: linear-gradient(90deg, #7a5c14, #e9c34a); transition: width 0.25s; }
#quotatxt { position: absolute; inset: 0; text-align: center; font-size: 13px; line-height: 21px; color: #fff; text-shadow: 0 1px 2px #000; }
#bossbanner {
  display: none; padding: 5px 14px; border-radius: 20px; font-size: 13px;
  background: #3a1610; border: 1px solid #a83f27; color: #ffb4a4;
}
.iconbtn { padding: 6px 11px; font-size: 15px; }

/* ---------- board ---------- */
#boardwrap { position: relative; flex: 1 1 auto; width: 100%; max-width: 1180px; min-height: 0; }
#board { position: absolute; inset: 0; width: 100%; height: 100%; cursor: grab; }
#forecast {
  position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
  background: rgba(20,16,10,0.85); border: 1px solid #4a3d24; border-radius: 8px;
  padding: 5px 16px; font-size: 14px; pointer-events: none;
}
#jamwarn {
  position: absolute; top: 44px; left: 50%; transform: translateX(-50%);
  background: rgba(58,16,10,0.92); border: 1px solid #a83f27; color: #ffb4a4;
  border-radius: 8px; padding: 4px 14px; font-size: 13px; display: none; pointer-events: none;
}

/* ---------- bottom dock ---------- */
#dock {
  width: 100%; max-width: 1180px; flex: 0 0 auto; padding: 8px 16px 14px;
  display: flex; flex-direction: column; gap: 8px;
}
#shoprow { display: none; gap: 10px; align-items: stretch; }
#shopoffers { display: flex; gap: 10px; flex: 1; flex-wrap: wrap; }
.offer {
  background: #241f16; border: 1px solid #4a3d24; border-radius: 10px;
  padding: 8px 10px; width: 148px; cursor: pointer; position: relative; text-align: center;
}
.offer:hover { border-color: #e9c34a; box-shadow: 0 0 12px rgba(233,195,74,0.25); }
.offer.sold { opacity: 0.35; pointer-events: none; }
.offer .nm { font-size: 13px; margin: 4px 0 2px; color: #efe6d0; font-family: Georgia, serif; }
.offer .cost { font-size: 14px; color: #e9c34a; }
.offer canvas { display: block; margin: 0 auto; }
.offer.r-rare { border-color: #5d7d91; } .offer.r-rare:hover { border-color: #9ab6c9; box-shadow: 0 0 12px rgba(154,182,201,0.3); }
.offer.r-epic { border-color: #b97e2e; background: linear-gradient(180deg, #2c2313, #241f16); }
.offer.r-epic:hover { border-color: #ffb757; box-shadow: 0 0 14px rgba(255,183,87,0.4); }
.offer.k-charm { border-style: dashed; }
#shopside { display: flex; flex-direction: column; gap: 8px; justify-content: center; }

#trayrow { display: flex; gap: 10px; align-items: center; min-height: 74px; }
#tray { display: flex; gap: 8px; flex: 1; flex-wrap: wrap; align-items: center; min-height: 68px;
  background: rgba(30,24,15,0.6); border: 1px dashed #4a3d24; border-radius: 12px; padding: 6px 10px; }
#tray .hint { color: #6f6250; font-size: 13px; }
.chip {
  width: 58px; height: 58px; border-radius: 50%; cursor: grab; position: relative;
  display: flex; align-items: center; justify-content: center;
}
.chip:hover { filter: brightness(1.15); }
.chip canvas { pointer-events: none; }
#sellzone {
  display: none; align-items: center; justify-content: center; width: 120px; border-radius: 12px;
  border: 2px dashed #a83f27; color: #ff9c86; font-size: 14px; text-align: center;
}
#sellzone.active { display: flex; }
#runbtn { min-width: 190px; }
#charmbar { display: flex; gap: 6px; }
.charm {
  width: 40px; height: 40px; border-radius: 8px; background: #241f16;
  border: 1px solid #6b5a2e; display: flex; align-items: center; justify-content: center;
  font-size: 20px; cursor: default;
}

/* ---------- tooltip ---------- */
#tooltip {
  position: fixed; display: none; z-index: 50; max-width: 260px; pointer-events: none;
  background: #100d08; border: 1px solid #6b5a2e; border-radius: 8px; padding: 10px 12px;
  font-size: 13px; line-height: 1.45; box-shadow: 0 6px 24px rgba(0,0,0,0.6);
}
#tooltip .tt-name { font-family: Georgia, serif; font-size: 15px; }
#tooltip .tt-rar { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; }
#tooltip .tt-sub { color: #a2947a; margin-top: 5px; font-size: 12px; }

/* ---------- overlay screens ---------- */
.screen {
  position: absolute; inset: 0; z-index: 40; display: none;
  background: rgba(10,8,5,0.88); backdrop-filter: blur(3px);
  align-items: center; justify-content: center;
}
.screen.on { display: flex; }
.panel {
  background: linear-gradient(180deg, #262019, #1a1510); border: 1px solid #6b5a2e;
  border-radius: 14px; padding: 28px 34px; max-width: 720px; width: calc(100% - 40px);
  max-height: calc(100vh - 60px); overflow-y: auto; text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
}
.panel h1 { font-size: 44px; color: #e9c34a; text-shadow: 0 0 24px rgba(233,195,74,0.4); }
.panel h2 { font-size: 26px; color: #e9c34a; margin-bottom: 10px; }
.panel p { margin: 10px 0; line-height: 1.55; color: #d8c9a4; }
.panel .row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 18px; }
.tag { font-size: 12px; letter-spacing: 0.25em; color: #a2947a; text-transform: uppercase; }
.statgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 24px; margin: 14px auto; max-width: 380px; text-align: left; font-size: 14px; }
.statgrid b { color: #e9c34a; float: right; }
.howgrid { text-align: left; font-size: 14px; line-height: 1.5; }
.howgrid h3 { color: #e9c34a; margin: 14px 0 4px; }
.kbd { background: #33291a; border: 1px solid #6b5a2e; border-radius: 4px; padding: 1px 7px; font-size: 12px; }

/* compendium */
#compgrid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 12px; }
.compcell { width: 74px; background: #1a1510; border: 1px solid #4a3d24; border-radius: 8px; padding: 6px 2px; font-size: 10px; text-align: center; }
.compcell.locked { opacity: 0.35; }
.compcell canvas { display: block; margin: 0 auto 3px; }

/* settings */
.setrow { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin: 12px 0; text-align: left; }
input[type=range] { width: 180px; accent-color: #e9c34a; }
input[type=text] {
  background: #17120c; color: #efe6d0; border: 1px solid #6b5a2e; border-radius: 6px;
  padding: 8px 10px; font-size: 14px; width: 200px;
}
input[type=checkbox] { accent-color: #e9c34a; transform: scale(1.3); }

/* payout breakdown */
#payout { position: absolute; z-index: 30; left: 50%; top: 42%; transform: translate(-50%,-50%);
  display: none; background: rgba(16,13,8,0.95); border: 1px solid #e9c34a; border-radius: 14px;
  padding: 22px 34px; text-align: center; box-shadow: 0 0 40px rgba(233,195,74,0.25); }
#payout h2 { font-size: 30px; }
#payout.fail { border-color: #a83f27; box-shadow: 0 0 40px rgba(168,63,39,0.3); }

.coach {
  position: absolute; z-index: 35; background: #2c2313; border: 1px solid #e9c34a; color: #efe6d0;
  border-radius: 10px; padding: 10px 14px; font-size: 13px; max-width: 240px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.6); animation: coachin 0.4s ease;
}
.coach:after { content: ""; position: absolute; bottom: -7px; left: 24px; width: 12px; height: 12px;
  background: #2c2313; border-right: 1px solid #e9c34a; border-bottom: 1px solid #e9c34a; transform: rotate(45deg); }
@keyframes coachin { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

.demobadge { position: fixed; top: 10px; right: 12px; z-index: 60; background: #3a2c10; border: 1px solid #e9c34a;
  color: #e9c34a; font-size: 11px; letter-spacing: 0.2em; padding: 3px 10px; border-radius: 12px; }

@media (max-width: 860px) {
  #hud { flex-wrap: wrap; gap: 8px; }
  .offer { width: 118px; }
}

</style>
</head>
<body>
<div id="app"></div>
<script>
/* ===== data.js ===== */
/* MAINSPRING — content data (gears, charms, contracts, boss modifiers)
   Pure data + effect functions. No DOM. Node-compatible for tests. */
'use strict';

const RARITY = { common: { name: 'Common', col: '#c9a227' }, rare: { name: 'Rare', col: '#9ab6c9' }, epic: { name: 'Epic', col: '#ffb757' } };

/* Effect context `c` fields:
   tick, ticks        — current tick (1-based), total ticks this shift
   dir                — 1 = clockwise, -1 = counter-clockwise, 0 = free (wild)
   nbs                — occupied neighbor list: {key, id, def, spinning, dir}
   emptyAdj           — number of empty adjacent cells (on board)
   edge               — true if cell is on the board rim
   gold               — current gold
   done               — contracts completed this run
   spinningCount      — total spinning gears on board (incl. drive)
   bestNbBase         — highest neighbor base output this tick (echo pass)
*/

const GEARS = {
  drive: { name: 'Mainspring Drive', rarity: 'common', cost: 0, fixed: true,
    text: 'The heart of the machine. +1 energy per tick. Everything must connect to it.',
    calc: c => 1 },

  /* ---------- Commons ---------- */
  brass: { name: 'Brass Dynamo', rarity: 'common', cost: 4,
    text: '+2 energy per tick.', calc: c => 2 },
  copper: { name: 'Copper Dynamo', rarity: 'common', cost: 5,
    text: '+3 energy if spinning clockwise, +1 otherwise.',
    calc: c => (c.dir === 1 ? 3 : 1) },
  tin: { name: 'Tin Dynamo', rarity: 'common', cost: 5,
    text: '+3 energy if spinning counter-clockwise, +1 otherwise.',
    calc: c => (c.dir === -1 ? 3 : 1) },
  crowd: { name: 'Crowd Cog', rarity: 'common', cost: 5,
    text: '+1 energy, plus +1 per spinning neighbor.',
    calc: c => 1 + c.nbs.filter(n => n.spinning).length },
  hermit: { name: 'Hermit Wheel', rarity: 'common', cost: 5,
    text: '+5 energy if it has at most 1 neighbor, else +1.',
    calc: c => (c.nbs.length <= 1 ? 5 : 1) },
  rim: { name: 'Rim Runner', rarity: 'common', cost: 5,
    text: '+4 energy on the board rim, +1 elsewhere.',
    calc: c => (c.edge ? 4 : 1) },
  escapement: { name: 'Escapement', rarity: 'common', cost: 6,
    text: 'Every 3rd tick: +8 energy.', calc: c => (c.tick % 3 === 0 ? 8 : 0) },
  flywheel: { name: 'Flywheel', rarity: 'common', cost: 6,
    text: 'Builds momentum: + energy equal to half the tick number.',
    calc: c => Math.floor(c.tick / 2) },
  pendulum: { name: 'Pendulum', rarity: 'common', cost: 5,
    text: 'Odd ticks: +4 energy. Even ticks: nothing.',
    calc: c => (c.tick % 2 === 1 ? 4 : 0) },
  mint: { name: 'Mint Wheel', rarity: 'common', cost: 6,
    text: '+1 energy per tick. Every 4th tick: +1 gold.',
    calc: c => 1, gcalc: c => (c.tick % 4 === 0 ? 1 : 0) },

  /* ---------- Rares ---------- */
  governor: { name: 'Governor', rarity: 'rare', cost: 9,
    text: 'Produces nothing. Adjacent spinning gears: +2 energy each.',
    calc: c => 0, buff: 2 },
  amp: { name: 'Amplifier Drum', rarity: 'rare', cost: 12,
    text: 'Produces nothing. Adjacent gears\' energy x1.5.',
    calc: c => 0, mult: 1.5 },
  ratchet: { name: 'Ratchet', rarity: 'rare', cost: 8,
    text: '+8 energy clockwise. Nothing counter-clockwise.',
    calc: c => (c.dir === 1 ? 8 : 0) },
  counterratchet: { name: 'Counter-Ratchet', rarity: 'rare', cost: 8,
    text: '+8 energy counter-clockwise. Nothing clockwise.',
    calc: c => (c.dir === -1 ? 8 : 0) },
  bushing: { name: 'Greased Bushing', rarity: 'rare', cost: 10, wild: true,
    text: '+1 energy. Meshes loosely: never jams, and neighbors may spin either way. Breaks odd loops.',
    calc: c => 1 },
  gilded: { name: 'Gilded Gear', rarity: 'rare', cost: 10,
    text: '+1 energy per 12 gold you hold.', calc: c => Math.floor(c.gold / 12) },
  echo: { name: 'Echo Wheel', rarity: 'rare', cost: 11,
    text: 'Copies 60% of the best adjacent gear\'s base output.',
    calc: c => Math.floor(c.bestNbBase * 0.6), echo: true },
  whistle: { name: 'Factory Whistle', rarity: 'rare', cost: 9,
    text: 'On the final tick: +22 energy.',
    calc: c => (c.tick === c.ticks ? 22 : 0) },
  twin: { name: 'Twin Gear', rarity: 'rare', cost: 8,
    text: '+3 energy. +3 more if adjacent to another Twin Gear.',
    calc: c => 3 + (c.nbs.some(n => n.id === 'twin') ? 3 : 0) },
  clockspring: { name: 'Clock Spring', rarity: 'rare', cost: 9,
    text: '+1 energy per contract you have completed this run.',
    calc: c => c.done },
  boiler: { name: 'Boiler', rarity: 'rare', cost: 10,
    text: '+7 energy, but adjacent gears -1 energy.',
    calc: c => 7, buff: -1 },

  /* ---------- Epics ---------- */
  grandgov: { name: 'Grand Governor', rarity: 'epic', cost: 16,
    text: 'Produces nothing. ALL spinning gears: +1 energy.',
    calc: c => 0, globalBuff: 1 },
  prime: { name: 'Dynamo Prime', rarity: 'epic', cost: 15,
    text: '+6 energy. +3 more if spinning clockwise.',
    calc: c => 6 + (c.dir === 1 ? 3 : 0) },
  perpetuum: { name: 'Perpetuum', rarity: 'epic', cost: 18,
    text: '+ energy equal to the tick number. Relentless.',
    calc: c => c.tick },
  midas: { name: 'Midas Drum', rarity: 'epic', cost: 16,
    text: '+2 energy per tick. Every 5th tick: +3 gold.',
    calc: c => 2, gcalc: c => (c.tick % 5 === 0 ? 3 : 0) },
  astrolabe: { name: 'Astrolabe', rarity: 'epic', cost: 14,
    text: '+9 energy with exactly 2 spinning neighbors, else +2.',
    calc: c => (c.nbs.filter(n => n.spinning).length === 2 ? 9 : 2) },
  carillon: { name: 'Carillon', rarity: 'epic', cost: 17,
    text: 'Every 5th tick: +2 energy per spinning gear on the board.',
    calc: c => (c.tick % 5 === 0 ? 2 * c.spinningCount : 0) },
  overdrive: { name: 'Overdrive Core', rarity: 'epic', cost: 20,
    text: 'Produces nothing. Adjacent gears\' energy x2.',
    calc: c => 0, mult: 2 },
};

/* Charms — global passive artifacts. Max 5 per run. */
const CHARMS = {
  oilcan: { name: 'Oil Can', cost: 12, text: '+1 tick every shift.' },
  ledger: { name: 'Ledger', cost: 8, text: '+3 gold base pay per contract.' },
  unioncard: { name: 'Union Card', cost: 10, text: 'Gears in the shop cost 20% less.' },
  springwinder: { name: 'Spring Winder', cost: 9, text: 'The Mainspring Drive produces +2 energy.' },
  overtimepermit: { name: 'Overtime Permit', cost: 11, text: 'Once per run: retry a failed shift.' },
  insurance: { name: 'Insurance Bond', cost: 9, text: 'Interest cap raised to 10 gold (from 5).' },
  luckycoin: { name: 'Lucky Coin', cost: 7, text: 'Shop rerolls always cost 1 gold.' },
  foreman: { name: 'Foreman\'s Whistle', cost: 13, text: 'Start each shift with +5 energy per contract completed.' },
};

/* Boss modifiers — applied on contracts 3 and 6 (seeded pick). */
const BOSS_MODS = {
  inspection: { name: 'Union Inspection', text: 'At most 10 gears may be installed.', maxGears: 10 },
  coldstart: { name: 'Cold Morning', text: 'The first 2 ticks produce nothing.', deadTicks: 2 },
  powercut: { name: 'Power Ration', text: 'This shift has 1 fewer tick.', tickPenalty: 1 },
  stickyvalves: { name: 'Sticky Valves', text: 'Every 4th tick produces nothing.', stickyEvery: 4 },
  heavyload: { name: 'Heavy Load', text: 'Multipliers are disabled.', noMult: true },
  offaxis: { name: 'Warped Chassis', text: 'Gears on the board rim produce nothing.', rimDead: true },
};

/* Contract quotas. Contracts 3 & 6 are bosses; 8 is the Grand Commission. */
const QUOTAS = [25, 45, 70, 105, 155, 225, 320, 450];
const BOSS_AT = [3, 6];
const FINAL_CONTRACT = 8;
const ENDLESS_GROWTH = 1.45;

const ECON = {
  startGold: 4,
  basePay: 9,
  surplusDiv: 3, surplusCap: 12,
  interestDiv: 10, interestCap: 5, interestCapInsured: 10,
  rerollBase: 2,
  ticksBase: 10,
  sellRatio: 0.5,
  expandCost: { 2: 10, 3: 22 },
  maxCharms: 5,
  shopGears: 4,
};

/* Starting tray. Drive is auto-placed at the center. */
const START_TRAY = ['brass', 'brass', 'copper'];

/* Rarity weights by contract number. */
function rarityWeights(contract) {
  if (contract >= 6) return { common: 0.40, rare: 0.42, epic: 0.18 };
  if (contract >= 4) return { common: 0.52, rare: 0.36, epic: 0.12 };
  if (contract >= 2) return { common: 0.68, rare: 0.28, epic: 0.04 };
  return { common: 0.85, rare: 0.15, epic: 0.0 };
}

/* Demo build: which gears/charms are available (epics + some rares held back). */
const DEMO_GEARS = ['brass', 'copper', 'tin', 'crowd', 'hermit', 'rim', 'escapement', 'flywheel', 'pendulum', 'mint', 'governor', 'ratchet', 'bushing'];
const DEMO_CHARMS = ['ledger', 'luckycoin', 'springwinder'];
const DEMO_LAST_CONTRACT = 3;

if (typeof module !== 'undefined' && module.exports) {
  module.exports = { RARITY, GEARS, CHARMS, BOSS_MODS, QUOTAS, BOSS_AT, FINAL_CONTRACT, ENDLESS_GROWTH, ECON, START_TRAY, rarityWeights, DEMO_GEARS, DEMO_CHARMS, DEMO_LAST_CONTRACT };
}


/* ===== engine.js ===== */
/* MAINSPRING — core engine. Pure logic, no DOM. Node-compatible for tests.
   Depends on data.js globals (or require in Node). */
'use strict';

var MSDATA = (typeof module !== 'undefined' && module.exports) ? require('./data.js')
  : { RARITY, GEARS, CHARMS, BOSS_MODS, QUOTAS, BOSS_AT, FINAL_CONTRACT, ENDLESS_GROWTH, ECON, START_TRAY, rarityWeights, DEMO_GEARS, DEMO_CHARMS, DEMO_LAST_CONTRACT };

const Engine = (() => {
  const D = MSDATA;

  /* ---------- RNG (deterministic, seedable) ---------- */
  function hashStr(s) {
    let h = 2166136261 >>> 0;
    for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
    return h >>> 0;
  }
  function mulberry32(a) {
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  /* advance state's rng; returns float [0,1) */
  function rand(st) {
    st.rngN = (st.rngN + 1) | 0;
    return mulberry32(st.rngSeed + st.rngN * 7919)();
  }
  function randInt(st, n) { return Math.floor(rand(st) * n); }
  function pick(st, arr) { return arr[randInt(st, arr.length)]; }

  /* ---------- Hex board (axial, pointy-top) ---------- */
  const DIRS = [[1, 0], [1, -1], [0, -1], [-1, 0], [-1, 1], [0, 1]];
  const K = (q, r) => q + ',' + r;
  const parseK = k => k.split(',').map(Number);
  function hexDist(q, r) { return Math.max(Math.abs(q), Math.abs(r), Math.abs(q + r)); }
  function inBoard(q, r, R) { return hexDist(q, r) <= R; }
  function isEdge(q, r, R) { return hexDist(q, r) === R; }
  function boardCells(R) {
    const out = [];
    for (let q = -R; q <= R; q++) for (let r = -R; r <= R; r++) if (inBoard(q, r, R)) out.push(K(q, r));
    return out;
  }
  function neighborKeys(k, R) {
    const [q, r] = parseK(k);
    const out = [];
    for (const [dq, dr] of DIRS) { const nq = q + dq, nr = r + dr; if (inBoard(nq, nr, R)) out.push(K(nq, nr)); }
    return out;
  }
  function sortedKeys(obj) { return Object.keys(obj).sort(); }

  /* ---------- Run state ---------- */
  function newRun(seedStr, mode, demo) {
    const st = {
      v: 1, seedStr, mode: mode || 'standard', demo: !!demo,
      rngSeed: hashStr(seedStr), rngN: 0,
      contract: 1, done: 0, gold: D.ECON.startGold, boardR: 1,
      gears: {}, tray: [], charms: [], uid: 1,
      shop: null, phase: 'build',
      overtimeUsed: false, endless: false,
      lastShift: null, canOvertime: false,
      stats: { totalEnergy: 0, peakShift: 0, gearsBought: 0, jamsHit: 0, rerolls: 0, goldEarned: 0, shifts: 0 },

    st.gears[K(0, 0)] = { id: 'drive', uid: 0 };
    for (const id of D.START_TRAY) st.tray.push({ id, uid: st.uid++ });
    return st;
  }

  function quota(st) {
    const c = st.contract;
    if (c <= D.FINAL_CONTRACT) return D.QUOTAS[c - 1];
    const q = D.QUOTAS[D.FINAL_CONTRACT - 1] * Math.pow(D.ENDLESS_GROWTH, c - D.FINAL_CONTRACT);
    return Math.round(q / 5) * 5;
  }
  function isBoss(st) {
    return D.BOSS_AT.includes(st.contract) || (st.contract > D.FINAL_CONTRACT && st.contract % 3 === 0);
  }
  function bossMod(st) {
    if (!isBoss(st)) return null;
    const keys = Object.keys(D.BOSS_MODS).sort();
    const r = mulberry32(hashStr(st.seedStr + '#boss' + st.contract))();
    return keys[Math.floor(r * keys.length)];
  }
  function ticksFor(st) {
    let t = D.ECON.ticksBase;
    if (st.charms.includes('oilcan')) t += 1;
    const bm = bossMod(st);
    if (bm && D.BOSS_MODS[bm].tickPenalty) t -= D.BOSS_MODS[bm].tickPenalty;
    return t;
  }

  /* ---------- Spin solver ----------
     Meshed gears must counter-rotate. Wild gears ("bushing") mesh loosely:
     they impose no parity constraint and never jam.
     Returns { connected:Set, spinning:Set, jammed:Set, dir:{key:1|-1|0} } */
  function computeSpin(st) {
    const R = st.boardR, G = st.gears;
    const drive = K(0, 0);
    const connected = new Set();
    if (G[drive]) {
      const q = [drive]; connected.add(drive);
      while (q.length) {
        const k = q.shift();
        for (const nk of neighborKeys(k, R)) if (G[nk] && !connected.has(nk)) { connected.add(nk); q.push(nk); }
      }
    }
    const isWild = k => !!(D.GEARS[G[k].id].wild);
    const dir = {}, jammed = new Set();
    /* Parity components over connected non-wild gears (edges: both non-wild). */
    const seen = new Set();
    const solids = [...connected].filter(k => !isWild(k)).sort();
    for (const root0 of solids) {
      if (seen.has(root0)) continue;
      /* collect component */
      const comp = [];
      const q = [root0]; seen.add(root0);
      while (q.length) {
        const k = q.shift(); comp.push(k);
        for (const nk of neighborKeys(k, R)) {
          if (G[nk] && connected.has(nk) && !isWild(nk) && !seen.has(nk)) { seen.add(nk); q.push(nk); }
        }
      }
      /* anchor: drive if present, else smallest key */
      const anchor = comp.includes(drive) ? drive : comp.slice().sort()[0];
      dir[anchor] = 1;
      let ok = true;
      const bq = [anchor]; const col = { [anchor]: 1 };
      while (bq.length) {

        for (const nk of neighborKeys(k, R)) {

          if (col[nk] === undefined) { col[nk] = -col[k]; dir[nk] = col[nk]; bq.push(nk); }

    while (grew) {

      for (const k of connected) {
        if (!isWild(k) || spinning.has(k)) continue;

      }

  /* ---------- Shift simulation (fully deterministic) ---------- */
  function simulateShift(st) {

    const spin = computeSpin(st);
    const bmKey = bossMod(st);
    const bm = bmKey ? D.BOSS_MODS[bmKey] : {};

    const keys = sortedKeys(G);

            emptyAdj: neighborKeys(k, R).length - nbCache[k].length,
            edge: isEdge(q, r, R), gold: st.gold, done: st.done,

        }

        for (const k of spinKeys) {

  /* ---------- Shift resolution ---------- */
  function pay(st, surplus) {

      st.lastShift = { energy: sim.energy, quota: q, success, payout, contract: st.contract, bossMod: sim.bossMod };

  }

    return true;
  }
  function nextContract(st) { if (st.phase === 'shop') st.phase = 'build'; }

  /* ---------- Shop ---------- */
  function gearPool(st) {
    let ids = Object.keys(D.GEARS).filter(id => id !== 'drive');
    if (st.demo) ids = ids.filter(id => D.DEMO_GEARS.includes(id));
    return ids;
  }
  function charmPool(st) {
    let ids = Object.keys(D.CHARMS).filter(id => !st.charms.includes(id));
    if (st.demo) ids = ids.filter(id => D.DEMO_CHARMS.includes(id));
    return ids;
  }
  function gearPrice(st, id) {
    let c = D.GEARS[id].cost;
    if (st.charms.includes('unioncard')) c = Math.ceil(c * 0.8);
    return c;
  }
  function rollGearId(st) {
    const w = D.rarityWeights(st.contract);
    const r = rand(st);
    const rar = r < w.common ? 'common' : (r < w.common + w.rare ? 'rare' : 'epic');
    let pool = gearPool(st).filter(id => D.GEARS[id].rarity === rar);
    if (!pool.length) pool = gearPool(st);

  }
  function genShop(st) {
    const offers = [];
    for (let i = 0; i < D.ECON.shopGears; i++) {
      const id = rollGearId(st);
      offers.push({ kind: 'gear', id, cost: gearPrice(st, id), sold: false });
    }
    const cp = charmPool(st);
    if (cp.length && st.charms.length < D.ECON.maxCharms) {
      const id = cp[randInt(st, cp.length)];
      offers.push({ kind: 'charm', id, cost: D.CHARMS[id].cost, sold: false });
    }
    if (st.boardR < 3)

    st.gold -= st.shop.rerollCost;
    st.stats.rerolls++;
    const keep = st.shop.offers.filter(o => o.kind === 'expand');
    const offers = [];
    for (let i = 0; i < D.ECON.shopGears; i++) {
      const id = rollGearId(st);
      offers.push({ kind: 'gear', id, cost: gearPrice(st, id), sold: false });
    }
    const cp = charmPool(st);
    if (cp.length && st.charms.length < D.ECON.maxCharms) {
      const id = cp[randInt(st, cp.length)];
      offers.push({ kind: 'charm', id, cost: D.CHARMS[id].cost, sold: false });

  function buy(st, idx) {
    const o = st.shop && st.shop.offers[idx];

    if (o.kind === 'charm' && st.charms.length >= D.ECON.maxCharms) return false;
    st.gold -= o.cost; o.sold = true;
    if (o.kind === 'gear') { st.tray.push({ id: o.id, uid: st.uid++ }); st.stats.gearsBought++; }
    else if (o.kind === 'charm') st.charms.push(o.id);
    else if (o.kind === 'expand') st.boardR++;
    return true;
  }

  /* ---------- Board editing (free during build & shop) ---------- */
  function findGear(st, uid) {
    for (const k of Object.keys(st.gears)) if (st.gears[k].uid === uid) return { where: 'board', key: k, g: st.gears[k] };
    const i = st.tray.findIndex(g => g.uid === uid);
    if (i >= 0) return { where: 'tray', idx: i, g: st.tray[i] };
    return null;
  }
  function placeGear(st, uid, key) {
    const f = findGear(st, uid);
    const [q, r] = parseK(key);
    if (!f || st.gears[key] || !inBoard(q, r, st.boardR)) return false;
    if (f.where === 'tray') { st.tray.splice(f.idx, 1); st.gears[key] = f.g; }
    else { if (f.g.id === 'drive') return false; delete st.gears[f.key]; st.gears[key] = f.g; }

  }
  function sellGear(st, uid) {
    const f = findGear(st, uid);
    if (!f || f.g.id === 'drive') return 0;
    const refund = Math.max(1, Math.floor(D.GEARS[f.g.id].cost * D.ECON.sellRatio));
    if (f.where === 'board') delete st.gears[f.key]; else st.tray.splice(f.idx, 1);

    return refund;
  }

  /* ---------- Persistence ---------- */
  function toJSON(st) { return JSON.stringify(st); }
  function fromJSON(s) {
    const st = JSON.parse(s);
    if (!st || st.v !== 1 || !st.gears || !st.gears['0,0']) return null;
    return st;
  }

  return {
    DIRS, K, parseK, hexDist, inBoard, isEdge, boardCells, neighborKeys,
    hashStr, mulberry32, rand, randInt, pick,
    newRun, quota, isBoss, bossMod, ticksFor,
    computeSpin, simulateShift, runShift, useOvertime, declineOvertime, enterEndless, nextContract,
    genShop, reroll, buy, gearPrice,
    placeGear, unplaceGear, sellGear, findGear,
    pay, toJSON, fromJSON,
  };
})();

if (typeof module !== 'undefined' && module.exports) module.exports = Engine;

      if (musStep % 2 === 0) noise(t, 0.015, 0.018, musStep % 4 === 0 ? 2600 : 2100, 4, musBus);

    if (anim.ti >= anim.log.length && !anim.done && Math.abs(anim.energyShown - anim.energyTarget) < 0.6) {
      anim.done = true; anim.energyShown = anim.energyTarget;
      setTimeout(finishShift, 350);
    }
  }
  function finishShift() {

  /* ================= coach marks ================= */
  function coach() {
    const c = $('coach');
    if (!st || coachStep > 2 || st.contract > 1 || anim) { c.style.display = 'none'; return; }
    const msgs = [
      '⚙ Drag a gear from the tray onto a cell next to the golden Drive.',
      '↻↺ Watch the arrows — every meshed gear flips direction. Avoid tight triangles: they JAM.',
      'When the forecast beats the quota, hit RUN SHIFT.',
    ];
    const placed = Object.keys(st.gears).length - 1;
    let step = placed === 0 ? 0 : (placed === 1 ? 1 : 2);
    if (step < coachStep) step = coachStep;
    coachStep = step;
    c.textContent = msgs[step];
    c.style.display = 'block';
    c.style.left = '30px'; c.style.bottom = '18px'; c.style.top = 'auto';
    if (step === 2 && placed >= 2) { meta.stats.coach = 3; saveMeta(); }
  }

  /* ================= canvas rendering ================= */
  function resize() {
    const r = $('boardwrap').getBoundingClientRect();
    DPR = window.devicePixelRatio || 1;
    W = r.width; H = r.height;
    canvas.width = Math.max(1, W * DPR); canvas.height = Math.max(1, H * DPR);
    ctx2.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  function frame(t) {
    const dt = Math.min(0.05, (t - lastT) / 1000 || 0.016); lastT = t;
    if (st && !document.querySelector('.screen.on')) {
      if (dirty) recompute();
      if (anim) stepAnim(dt);
      draw(dt);
    }
    requestAnimationFrame(frame);
  }
  function hexPath(x, y, S) {
    ctx2.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = Math.PI / 3 * i + Math.PI / 6;
      const px = x + S * Math.cos(a), py = y + S * Math.sin(a);
      i ? ctx2.lineTo(px, py) : ctx2.moveTo(px, py);
    }
    ctx2.closePath();
  }
  function draw(dt) {
    const rw = $('boardwrap').getBoundingClientRect();
    if (Math.abs(rw.width - W) > 1 || Math.abs(rw.height - H) > 1) resize();
    ctx2.clearRect(0, 0, W, H);
    let ox = 0, oy = 0;
    if (shake > 0) { shake = Math.max(0, shake - dt * 40); ox = (Math.random() - 0.5) * shake; oy = (Math.random() - 0.5) * shake; }
    ctx2.save(); ctx2.translate(ox, oy);
    const S = cellSize();
    /* cells */
    for (const k of E.boardCells(st.boardR)) {
      const p = cellXY(k);
      hexPath(p.x, p.y, S * 0.96);
      const hov = k === hoverKey && canEdit();
      const validDrop = carrying && !st.gears[k];
      ctx2.fillStyle = hov ? (validDrop ? 'rgba(233,195,74,0.14)' : 'rgba(233,195,74,0.07)') : 'rgba(255,255,255,0.025)';
      ctx2.fill();
      ctx2.strokeStyle = hov ? '#e9c34a' : 'rgba(160,135,80,0.28)';
      ctx2.lineWidth = hov ? 1.6 : 1;
      ctx2.stroke();
    }
    /* advance visual angles */
    const speed = anim ? 2.4 : 0.5;
    for (const k of Object.keys(st.gears)) {
      const dir = spinCache ? (spinCache.dir[k] || 0) : 0;
      const spins = spinCache && spinCache.spinning.has(k);
      if (gearAngles[k] === undefined) gearAngles[k] = 0;
      if (spins && !meta.settings.reduceMotion) gearAngles[k] += (dir === 0 ? 0.6 : dir) * speed * dt;
    }
    /* gears */
    for (const k of Object.keys(st.gears).sort()) {
      const p = cellXY(k);
      drawGear(ctx2, p.x, p.y, S * 0.88, st.gears[k].id, gearAngles[k] || 0, gearState(k));
    }
    /* floaters */
    ctx2.textAlign = 'center'; ctx2.font = 'bold 15px Georgia, serif';
    floaters = floaters.filter(f => (f.age += dt) < 1.1);
    for (const f of floaters) {
      ctx2.globalAlpha = Math.max(0, 1 - f.age / 1.1);
      ctx2.fillStyle = f.col;
      ctx2.fillText(f.txt, f.x, f.y - f.age * 34);
    }
    ctx2.globalAlpha = 1;
    /* sparks */
    sparks = sparks.filter(sp => (sp.age += dt) < 0.6);
    for (const sp of sparks) {
      sp.x += sp.vx * dt; sp.y += sp.vy * dt; sp.vy += 220 * dt;
      ctx2.globalAlpha = 1 - sp.age / 0.6;
      ctx2.fillStyle = '#ffd166';
      ctx2.fillRect(sp.x, sp.y, 2.4, 2.4);
    }
    ctx2.globalAlpha = 1;
    /* carried gear ghost */
    if (carrying) drawGear(ctx2, mouse.x, mouse.y, S * 0.8, carrying.id, 0, { ghost: true });
    ctx2.restore();
  }
  function gearState(k) {
    if (!spinCache) return {};
    return {
      jammed: spinCache.jammed.has(k),
      idle: !spinCache.connected.has(k),
      dir: spinCache.dir[k] || 0,
      spinning: spinCache.spinning.has(k),
      drive: st.gears[k].id === 'drive',
    };
  }
  function spawnSparks(x, y, n) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2, v = 40 + Math.random() * 90;
      sparks.push({ x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v - 60, age: 0 });
    }
  }

  /* metal palettes per rarity */
  const METALS = {
    common: ['#d8b45a', '#8a6d24', '#5c4715'],
    rare: ['#b9cdd8', '#6d8b9b', '#3d5560'],
    epic: ['#ffd08a', '#c98a2e', '#7a4d12'],
  };
  function idHash(id) { let h = 0; for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) | 0; return Math.abs(h); }

  function drawGear(g, x, y, R, id, angle, stt) {
    stt = stt || {};
    const def = D.GEARS[id];
    const pal = METALS[def.rarity] || METALS.common;
    const teeth = 10 + (idHash(id) % 3) * 2;
    const rOut = R * 0.92, rBody = R * 0.74, rHub = R * 0.26;
    g.save();
    g.translate(x, y);
    if (stt.jammed) g.translate((Math.random() - 0.5) * 1.6, (Math.random() - 0.5) * 1.6);
    if (stt.ghost) g.globalAlpha = 0.55;
    if (stt.idle) g.globalAlpha = 0.45;
    g.rotate(angle);
    /* teeth */
    g.beginPath();
    for (let i = 0; i < teeth; i++) {
      const a0 = (i / teeth) * Math.PI * 2, aw = Math.PI / teeth;
      const t1 = a0 - aw * 0.42, t2 = a0 - aw * 0.18, t3 = a0 + aw * 0.18, t4 = a0 + aw * 0.42;
      g.lineTo(Math.cos(t1) * rBody, Math.sin(t1) * rBody);
      g.lineTo(Math.cos(t2) * rOut, Math.sin(t2) * rOut);
      g.lineTo(Math.cos(t3) * rOut, Math.sin(t3) * rOut);
      g.lineTo(Math.cos(t4) * rBody, Math.sin(t4) * rBody);
    }
    g.closePath();
    const grad = g.createRadialGradient(-R * 0.3, -R * 0.3, R * 0.1, 0, 0, R);
    grad.addColorStop(0, pal[0]); grad.addColorStop(0.7, pal[1]); grad.addColorStop(1, pal[2]);
    g.fillStyle = grad; g.fill();
    g.strokeStyle = 'rgba(0,0,0,0.45)'; g.lineWidth = 1; g.stroke();
    /* body ring */
    g.beginPath(); g.arc(0, 0, rBody * 0.98, 0, Math.PI * 2);
    g.strokeStyle = 'rgba(255,255,255,0.14)'; g.lineWidth = 1.2; g.stroke();
    /* spokes */
    const spokes = 3 + (idHash(id) % 3);
    g.strokeStyle = 'rgba(40,28,10,0.55)'; g.lineWidth = R * 0.1;
    for (let i = 0; i < spokes; i++) {
      const a = (i / spokes) * Math.PI * 2;
      g.beginPath(); g.moveTo(Math.cos(a) * rHub, Math.sin(a) * rHub);
      g.lineTo(Math.cos(a) * rBody * 0.82, Math.sin(a) * rBody * 0.82); g.stroke();
    }
    /* hub */
    g.beginPath(); g.arc(0, 0, rHub, 0, Math.PI * 2);
    g.fillStyle = stt.drive ? '#e9c34a' : pal[1]; g.fill();
    g.strokeStyle = 'rgba(0,0,0,0.5)'; g.stroke();
    g.rotate(-angle);
    /* wild = greased sheen */
    if (def.wild) { g.beginPath(); g.arc(0, 0, rBody * 0.6, 0, Math.PI * 2); g.strokeStyle = 'rgba(180,240,255,0.5)'; g.setLineDash([4, 5]); g.lineWidth = 2; g.stroke(); g.setLineDash([]); }
    /* monogram */
    g.fillStyle = stt.drive ? '#1d1710' : 'rgba(255,244,214,0.92)';
    g.font = `bold ${Math.round(R * 0.34)}px Georgia, serif`;
    g.textAlign = 'center'; g.textBaseline = 'middle';
    g.fillText(stt.drive ? '⌂' : def.name[0], 0, 1);
    /* status ring / direction arrow */
    if (!stt.ghost) {
      if (stt.jammed) {
        g.strokeStyle = '#ff5a40'; g.lineWidth = 3; g.beginPath();
        g.arc(0, 0, rOut + 2.5, 0, Math.PI * 2); g.stroke();
        g.font = `bold ${Math.round(R * 0.6)}px sans-serif`; g.fillStyle = '#ff5a40';
        g.fillText('✕', 0, 1);
      } else if (stt.spinning) {
        drawDirArrow(g, rOut + 4, stt.dir);
      } else if (stt.idle) {
        g.font = `${Math.round(R * 0.42)}px sans-serif`; g.fillStyle = 'rgba(200,190,160,0.8)';
        g.fillText('⏾', rOut * 0.62, -rOut * 0.62);
      }
    }
    g.restore();
  }
  function drawDirArrow(g, r, dir) {
    if (dir === 0) { /* free spinner: dashed circle */
      g.beginPath(); g.arc(0, 0, r, 0, Math.PI * 2);
      g.strokeStyle = 'rgba(150,220,255,0.6)'; g.lineWidth = 1.6; g.setLineDash([3, 6]); g.stroke(); g.setLineDash([]);
      return;
    }
    const col = dir === 1 ? 'rgba(255,214,102,0.95)' : 'rgba(122,199,255,0.95)';
    const a0 = -Math.PI / 2, a1 = a0 + (dir === 1 ? 1 : -1) * Math.PI * 0.5;
    g.beginPath(); g.arc(0, 0, r, Math.min(a0, a1), Math.max(a0, a1));
    g.strokeStyle = col; g.lineWidth = 2.2; g.stroke();
    const ax = Math.cos(a1) * r, ay = Math.sin(a1) * r;
    const tang = a1 + (dir === 1 ? Math.PI / 2 : -Math.PI / 2);
    g.beginPath();
    g.moveTo(ax + Math.cos(tang) * 7, ay + Math.sin(tang) * 7);
    g.lineTo(ax + Math.cos(tang + 2.6) * 6, ay + Math.sin(tang + 2.6) * 6);
    g.lineTo(ax + Math.cos(tang - 2.6) * 6, ay + Math.sin(tang - 2.6) * 6);
    g.closePath(); g.fillStyle = col; g.fill();
  }
  function drawGearIcon(cv, id, size) {
    cv.width = size; cv.height = size;
    const g = cv.getContext('2d');
    drawGear(g, size / 2, size / 2, size * 0.46, id, 0.3, {});
  }

  /* ================= events ================= */
  function addEvents() {
    window.addEventListener('resize', resize);
    canvas.addEventListener('mousemove', ev => {
      const r = canvas.getBoundingClientRect();
      mouse.x = ev.clientX - r.left; mouse.y = ev.clientY - r.top;

      if (k !== hoverKey) hoverKey = k;
      if (!carrying && k && st && st.gears[k]) {
        const stt = gearState(k);
        const extra = stt.jammed ? '<div class="tt-sub red">JAMMED — part of an odd loop.</div>' : (stt.idle ? '<div class="tt-sub">Idle — not connected to the Drive.</div>' : '');
        tipAt(ev.clientX, ev.clientY, gearTipHtml(st.gears[k].id, extra));
      } else if (!carrying) hideTip();
    });
    canvas.addEventListener('mouseleave', () => { hoverKey = null; hideTip(); });
    canvas.addEventListener('mousedown', ev => {
      if (ev.button !== 0 || !canEdit()) return;
      const k = pickCell(mouse.x, mouse.y);

        const gg = st.gears[k];

    window.addEventListener('mouseup', ev => {
      if (!carrying) return;
      const r = canvas.getBoundingClientRect();

      const sz = $('sellzone').getBoundingClientRect();

    });
    canvas.addEventListener('contextmenu', ev => {

      }
    });

    $('runbtn').addEventListener('click', () => { AudioSys.ensure(); runShift(); });
    $('btn-next').addEventListener('click', () => { AudioSys.sfx('click'); E.nextContract(st); dirty = true; syncAll(); });
    $('btn-reroll').addEventListener('click', () => { if (E.reroll(st)) { AudioSys.sfx('click'); syncAll(); } else AudioSys.sfx('denied'); });

  /* ================= settings / compendium / unlock ================= */
  function applySettingsToAudio() {
    AudioSys.setVol('master', meta.settings.master);
    AudioSys.setVol('sfx', meta.settings.sfx);
    AudioSys.setVol('music', meta.settings.music);
    AudioSys.setMusic(meta.settings.musicOn);
  }
  function openSettings() {
    $('set-master').value = meta.settings.master * 100;
    $('set-sfx').value = meta.settings.sfx * 100;
    $('set-music').value = meta.settings.music * 100;
    $('set-musicon').checked = meta.settings.musicOn;
    $('set-motion').checked = meta.settings.reduceMotion;
    $('unlockrow').style.display = isDemo() ? '' : 'none';
    showScreen('settings');
    const bind = (id, key, isCheck) => {
      $(id).oninput = () => {
        meta.settings[key] = isCheck ? $(id).checked : $(id).value / 100;
        applySettingsToAudio(); saveMeta();
      };
    };
    bind('set-master', 'master'); bind('set-sfx', 'sfx'); bind('set-music', 'music');
    bind('set-musicon', 'musicOn', true); bind('set-motion', 'reduceMotion', true);
  }
  /* djb2 — matches codes generated by build.py (see LAUNCH_KIT.md) */
  function djb2(s) { let h = 5381; for (let i = 0; i < s.length; i++) h = ((h * 33) + s.charCodeAt(i)) >>> 0; return h; }
  function tryUnlock() {
    const code = ($('set-code').value || '').trim().toUpperCase();
    if (unlockHashes.includes(djb2(code)) && code.length > 5) {
      meta.unlocked = true; saveMeta();
      alert('Unlocked! The full Gearworks is yours. The page will reload.');
      location.reload();
    } else { AudioSys.sfx('denied'); $('set-code').value = ''; $('set-code').placeholder = 'Invalid code'; }
  }
  function fillCompendium() {
    const grid = $('compgrid'); grid.innerHTML = '';
    const all = Object.keys(D.GEARS);
    let found = 0;
    for (const id of all) {
      const has = meta.discovered.includes(id);
      if (has) found++;
      const cell = document.createElement('div');
      cell.className = 'compcell' + (has ? '' : ' locked');
      const cv = document.createElement('canvas');
      drawGearIcon(cv, id, 44);
      cell.appendChild(cv);
      const nm = document.createElement('div');
      nm.textContent = has ? D.GEARS[id].name : '???';
      cell.appendChild(nm);
      if (has) {
        cell.addEventListener('mouseenter', () => tipGear(cell, id));
        cell.addEventListener('mouseleave', hideTip);
      }
      grid.appendChild(cell);
    }
    $('comp-count').textContent = `Discovered ${found} / ${all.length} gears` + (isDemo() ? ' (demo shows a limited set)' : '');
  }

  return { init };
})();
